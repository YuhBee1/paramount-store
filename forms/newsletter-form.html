<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter - Paramount E-mart</title>
    <link rel="icon" type="image/png" href="../../images/logo.png"/>
    <link rel="apple-touch-icon" href="../../images/logo.png"/>
    <meta property="og:image" content="https://www.paramountdigitalservices.com/images/logo.png"/>
    <meta name="twitter:image" content="https://www.paramountdigitalservices.com/images/logo.png"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f3460 0%, #16213e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        header { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; color: white; }
        header img { width: 50px; height: 50px; border-radius: 6px; }
        h1 { font-size: 28px; background: linear-gradient(135deg, #0288d1 0%, #00bcd4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .back-btn { position: absolute; top: 20px; left: 20px; color: #0288d1; text-decoration: none; }
        .back-btn:before { content: "← "; }
        .form-card { background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(2, 136, 209, 0.2); border-radius: 12px; padding: 40px; backdrop-filter: blur(10px); }
        .benefits { background: rgba(2, 136, 209, 0.1); border: 2px solid rgba(2, 136, 209, 0.3); border-radius: 8px; padding: 20px; margin-bottom: 30px; color: white; }
        .benefits h3 { margin-bottom: 12px; font-size: 14px; color: #0288d1; }
        .benefit-item { margin-bottom: 8px; padding-left: 20px; position: relative; font-size: 13px; }
        .benefit-item:before { content: "✓"; position: absolute; left: 0; color: #00bcd4; font-weight: bold; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: white; font-weight: 500; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 15px; border: 2px solid rgba(2, 136, 209, 0.3); border-radius: 6px; background: rgba(255, 255, 255, 0.05); color: white; font-size: 14px; font-family: inherit; transition: all 0.3s; }
        input:focus { outline: none; border-color: #0288d1; background: rgba(255, 255, 255, 0.08); }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #0288d1 0%, #00bcd4 100%); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(2, 136, 209, 0.3); }
        .message { padding: 15px; border-radius: 6px; margin-bottom: 20px; display: none; }
        .message.success { background: rgba(39, 174, 96, 0.1); border: 2px solid #27ae60; color: #2ecc71; }
        .checkbox { display: flex; align-items: center; gap: 10px; margin-top: 15px; padding: 12px; background: rgba(2, 136, 209, 0.1); border-radius: 6px; }
        .checkbox input { width: auto; margin: 0; }
        .checkbox label { margin: 0; font-size: 13px; }
        small { display: block; color: rgba(255, 255, 255, 0.4); margin-top: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">Back to Forms</a>

    <div class="container">
        <header>
            <img src="../../images/logo.png" alt="Logo">
            <h1>📧 Newsletter Signup</h1>
        </header>

        <div class="form-card">
            <div class="benefits">
                <h3>✨ What You'll Get:</h3>
                <div class="benefit-item">Exclusive discounts & early access to sales</div>
                <div class="benefit-item">New product announcements</div>
                <div class="benefit-item">Weekly deals & special offers</div>
                <div class="benefit-item">Tips and product recommendations</div>
                <div class="benefit-item">VIP member privileges</div>
            </div>

            <div id="message" class="message"></div>

            <form onsubmit="submitNewsletter(event)">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" required placeholder="Enter your first name">
                </div>

                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" required placeholder="your@email.com">
                    <small>We'll never spam you</small>
                </div>

                <div class="form-group">
                    <label>Interests (Select at least one)</label>
                    <div class="checkbox">
                        <input type="checkbox" id="electronics" name="interests" value="Electronics">
                        <label for="electronics">Electronics & Gadgets</label>
                    </div>
                    <div class="checkbox">
                        <input type="checkbox" id="fashion" name="interests" value="Fashion">
                        <label for="fashion">Fashion & Style</label>
                    </div>
                    <div class="checkbox">
                        <input type="checkbox" id="home" name="interests" value="Home">
                        <label for="home">Home & Living</label>
                    </div>
                    <div class="checkbox">
                        <input type="checkbox" id="sports" name="interests" value="Sports">
                        <label for="sports">Sports & Fitness</label>
                    </div>
                </div>

                <div class="checkbox">
                    <input type="checkbox" id="agree" name="agree" required>
                    <label for="agree">I agree to receive marketing emails and special offers</label>
                </div>

                <button type="submit" style="margin-top: 20px;">📧 Subscribe to Newsletter</button>
            </form>
        </div>
    </div>

    <script>
        function submitNewsletter(e) {
            e.preventDefault();
            const messageEl = document.getElementById('message');
            messageEl.textContent = '✓ Welcome! Check your email for a confirmation link. Don\'t forget to check spam!';
            messageEl.classList.add('success');
            messageEl.style.display = 'block';
            e.target.reset();
            setTimeout(() => messageEl.style.display = 'none', 5000);
        }
    </script>
</body>
</html>
